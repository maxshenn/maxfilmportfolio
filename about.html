<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Max Shen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>

    /* ── Tokens ───────────────────────────────────────────────── */
    :root {
      --bg:    #090807;
      --text:  #f0ece2;
      --muted: rgba(240, 236, 226, 0.36);
      --dim:   rgba(240, 236, 226, 0.08);
      --nav-h: 58px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      line-height: 1;
      overflow-x: hidden;
      opacity: 0;
      transition: opacity 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    body.ready { opacity: 1; }

    /* ── Film grain ───────────────────────────────────────────── */
    #grain {
      position: fixed;
      inset: 0;
      z-index: 9000;
      pointer-events: none;
      opacity: 0.042;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      mix-blend-mode: screen;
      animation: grain 0.12s steps(1) infinite;
    }
    @keyframes grain {
      0%  { transform: translate(0,0); }
      25% { transform: translate(-5px, 3px); }
      50% { transform: translate(4px, -4px); }
      75% { transform: translate(-3px, 5px); }
    }

    /* ── Nav ──────────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      height: var(--nav-h);
      padding: 0 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text);
      text-decoration: none;
      text-shadow: 0 1px 14px rgba(0,0,0,0.4);
    }
    .nav-name .ext { color: var(--muted); }
    .nav-back {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .nav-back:hover { opacity: 0.7; }

    /* ── Fade-up animation ────────────────────────────────────── */
    .fade-up {
      opacity: 0;
      transform: translateY(36px);
      transition: opacity 1.0s cubic-bezier(0.22, 0.61, 0.36, 1),
                  transform 1.0s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    .fade-up.in { opacity: 1; transform: translateY(0); }
    .d1 { transition-delay: 0.12s; }
    .d2 { transition-delay: 0.26s; }
    .d3 { transition-delay: 0.42s; }
    .d4 { transition-delay: 0.58s; }
    .d5 { transition-delay: 0.74s; }

    /* ── Page wrapper — everything centered ───────────────────── */
    .about-page {
      min-height: 100vh;
      padding: calc(var(--nav-h) + 72px) 40px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── Section label ────────────────────────────────────────── */
    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 52px;
    }

    /* ── Photo ────────────────────────────────────────────────── */
    .about-photo-wrap {
      width: 340px;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      margin-bottom: 44px;
    }
    .about-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: brightness(0.88) saturate(0.72);
      display: block;
      transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .about-photo-wrap:hover .about-photo { transform: scale(1.03); }

    /* ── Heading ──────────────────────────────────────────────── */
    .about-heading {
      font-family: 'Montserrat', sans-serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(40px, 4.8vw, 70px);
      line-height: 1.06;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 28px;
    }
    .about-heading em {
      font-style: italic;
      color: var(--text);
    }

    /* ── Body copy ────────────────────────────────────────────── */
    .about-body {
      max-width: 420px;
    }
    .about-body p {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 300;
      line-height: 2.0;
      color: var(--text);
    }

    /* ── Tags ─────────────────────────────────────────────────── */
    .about-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      margin-top: 32px;
    }
    .about-tag {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--dim);
      padding: 6px 12px;
    }

    /* ── Contact CTA ──────────────────────────────────────────── */
    .contact-cta {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(36px, 4.2vw, 60px);
      line-height: 1.06;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-top: 72px;
      text-align: center;
      width: 100%;
    }
    .contact-cta em {
      font-style: italic;
      color: var(--muted);
    }

    /* ── Contact icons ────────────────────────────────────────── */
    .contact-icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-top: 24px;
    }
    .contact-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(240, 236, 226, 0.6);
      text-decoration: none;
      transition: color 0.22s, transform 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .contact-icon:hover {
      color: var(--text);
      transform: scale(1.16);
    }
    .contact-icon:active { transform: scale(0.94); }
    .contact-icon svg {
      width: 44px;
      height: 44px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Contact form ─────────────────────────────────────────── */
    .contact-form {
      margin-top: 44px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .contact-form textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(240, 236, 226, 0.18);
      padding: 0 0 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.6;
      min-height: 28px;
      transition: border-color 0.25s;
    }
    .contact-form textarea::placeholder {
      color: rgba(240, 236, 226, 0.24);
      letter-spacing: 0.1em;
    }
    .contact-form textarea:focus {
      border-bottom-color: rgba(240, 236, 226, 0.55);
    }
    .contact-form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .contact-form-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(240, 236, 226, 0.2);
    }
    .contact-send {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(240, 236, 226, 0.5);
      background: none;
      border: 1px solid rgba(240, 236, 226, 0.22);
      padding: 8px 20px;
      cursor: pointer;
      transition: color 0.22s, border-color 0.22s, background 0.22s;
    }
    .contact-send:hover {
      color: #000;
      background: var(--text);
      border-color: var(--text);
    }
    .contact-send:active { transform: scale(0.97); }
    .contact-confirm {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(240, 236, 226, 0.38);
      opacity: 0;
      transition: opacity 0.5s ease;
      text-align: center;
      margin-top: 4px;
    }
    .contact-confirm.visible { opacity: 1; }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      padding: 20px 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-copy,
    .footer-handle {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-handle:hover { color: var(--text); }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 960px) {
      nav { padding: 0 24px; }
      .about-page { padding: calc(var(--nav-h) + 48px) 24px 64px; }
      footer { padding: 20px 24px; }
    }

  </style>
</head>
<body>

  <div id="grain" aria-hidden="true"></div>

  <!-- ── Nav ──────────────────────────────────────────────────── -->
  <nav>
    <a href="index.html" class="nav-name" id="home-link">maxshen<span class="ext">.mp4</span></a>
    <a href="index.html" class="nav-back" id="back-link">← Back</a>
  </nav>

  <!-- ── About content ────────────────────────────────────────── -->
  <main class="about-page">

    <p class="section-label fade-up">About</p>

    <div class="about-photo-wrap fade-up d1">
      <img src="maxfilmphoto.jpg" class="about-photo" alt="Max Shen">
    </div>

    <h1 class="about-heading fade-up d2">
      a visual <em>memoir</em>
    </h1>

    <div class="about-body fade-up d3">
      <p>
        From Vancouver, student in New York City.<br>
        Capturing moments and frames to look back on.<br>
        Always exploring.
      </p>
      <div class="about-tags">
        <span class="about-tag">Premiere Pro</span>
        <span class="about-tag">DaVinci Resolve</span>
        <span class="about-tag">After Effects</span>
        <span class="about-tag">Nikon Z6III</span>
        <span class="about-tag">Osmo Pocket 3</span>
      </div>
    </div>

    <h2 class="contact-cta fade-up d4">Let's create <em>something.</em></h2>

    <div class="contact-icons fade-up d5">
      <!-- Email -->
      <a href="mailto:maxshenfilm@gmail.com" class="contact-icon" aria-label="Email">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
      </a>
      <!-- Instagram -->
      <a href="https://instagram.com/maxshen.mp4" target="_blank" rel="noopener" class="contact-icon" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
    </div>

    <form class="contact-form fade-up d5" id="contactForm" novalidate>
      <textarea id="contactMsg" rows="1" placeholder="write a message…" maxlength="1000"></textarea>
      <div class="contact-form-row">
        <span class="contact-form-hint">maxshenfilm@gmail.com</span>
        <button type="submit" class="contact-send">Send</button>
      </div>
      <p class="contact-confirm" id="contactConfirm">message sent —</p>
    </form>

  </main>


  <script>
    document.addEventListener('DOMContentLoaded', () => {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.body.classList.add('ready');
        document.querySelectorAll('.fade-up').forEach(el => el.classList.add('in'));
      }));
    });

    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const msg = document.getElementById('contactMsg').value.trim();
      if (!msg) return;
      const mailto = 'mailto:maxshenfilm@gmail.com'
        + '?subject=' + encodeURIComponent('Message from maxshen.mp4')
        + '&body=' + encodeURIComponent(msg);
      window.location.href = mailto;
      document.getElementById('contactMsg').value = '';
      const confirm = document.getElementById('contactConfirm');
      confirm.classList.add('visible');
      setTimeout(() => confirm.classList.remove('visible'), 3500);
    });

    ['home-link', 'back-link'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('click', e => {
        e.preventDefault();
        const dest = el.getAttribute('href');
        document.body.style.transition = 'opacity 0.55s cubic-bezier(0.4,0,0.2,1)';
        document.body.style.opacity = '0';
        setTimeout(() => { window.location.href = dest; }, 560);
      });
    });
  </script>

</body>
</html>
